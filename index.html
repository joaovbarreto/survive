<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- ===== CABEÇALHO: informações sobre a página (nada disso aparece na tela) ===== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>survive — pausas de respiração</title>

  <!-- ===== CSS: a aparência (cores, tamanhos, posições) ===== -->
  <style>
    /* "*" = todos os elementos. Zera margens padrão dos navegadores. */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* O fundo da página: um degradê escuro e calmo, tudo centralizado. */
    body {
      min-height: 100vh; /* ocupa a altura inteira da janela */
      display: flex;
      align-items: center;     /* centraliza na vertical */
      justify-content: center; /* centraliza na horizontal */
      background: linear-gradient(160deg, #1d2b3a 0%, #16222e 100%);
      color: #e8eef2;
      font-family: "Segoe UI", system-ui, sans-serif;
      text-align: center;
    }

    /* O "cartão" central que agrupa tudo. */
    .card {
      padding: 2.5rem 2rem;
      max-width: 26rem;
      width: 90%;
    }

    h1 {
      font-size: 2rem;
      font-weight: 300;      /* fonte fininha, mais leve */
      letter-spacing: 0.3em; /* espacinho entre as letras */
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #9fb3c2;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }

    /* O bloco do intervalo: rótulo + campo numérico. */
    .interval-row {
      margin-bottom: 2rem;
    }

    .interval-row label {
      display: block;
      color: #9fb3c2;
      font-size: 0.9rem;
      margin-bottom: 0.6rem;
    }

    #interval {
      width: 6rem;
      padding: 0.5rem;
      font-size: 1.3rem;
      text-align: center;
      color: #e8eef2;
      background: rgba(255, 255, 255, 0.07); /* branco quase transparente */
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 0.5rem;
    }

    /* Quando o campo está desabilitado (ciclo rodando), fica apagadinho. */
    #interval:disabled {
      opacity: 0.4;
    }

    /* O botão Iniciar/Pausar. */
    #toggle {
      padding: 0.8rem 2.8rem;
      font-size: 1.05rem;
      color: #16222e;
      background: #7fd4c1; /* verde-água suave */
      border: none;
      border-radius: 2rem; /* cantos bem redondos */
      cursor: pointer;
    }

    #toggle:hover {
      background: #98e0cf;
    }

    /* Linha de status abaixo do botão. */
    #status {
      margin-top: 1.5rem;
      color: #9fb3c2;
      font-size: 0.9rem;
      min-height: 1.2rem; /* reserva o espaço mesmo vazio, para nada "pular" */
    }

    /* ===== O OVERLAY DE RESPIRAÇÃO (o coração do app) ===== */

    /* A camada que cobre a tela inteira durante a pausa. */
    #overlay {
      display: none; /* começa invisível; o JavaScript liga e desliga */
      position: fixed;  /* "fixed" = flutua sobre tudo, preso à janela */
      inset: 0;         /* cola nas quatro bordas da janela */
      background: rgba(16, 26, 35, 0.97); /* quase opaco, para acalmar a tela */
      z-index: 10;      /* fica na frente de qualquer outra coisa */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* Quando o overlay ganha a classe "aberto", ele aparece. */
    #overlay.aberto {
      display: flex;
    }

    /* A frase de abertura, convite para soltar o corpo. */
    #frase {
      font-size: 1.25rem;
      font-weight: 300;
      color: #cfe3dd;
      max-width: 22rem;
      line-height: 1.6;
    }

    /* O círculo que respira. O tamanho muda via "transform: scale(...)"
       controlado pelo JavaScript — o CSS "transition" faz o movimento
       ser suave em vez de um pulo seco. */
    #circulo {
      width: 8.5rem;
      height: 8.5rem;
      border-radius: 50%; /* 50% num quadrado = círculo perfeito */
      background: radial-gradient(circle at 35% 35%, #a5ead7, #4da58e);
      box-shadow: 0 0 70px rgba(127, 212, 193, 0.35); /* brilho ao redor */
      margin: 2.5rem 0 2rem;
    }

    /* O rótulo da fase: "Inspire pelo nariz" / "Solte pela boca (biquinho)". */
    #fase {
      font-size: 1.1rem;
      color: #e8eef2;
      min-height: 1.5rem;
    }

    /* Contador discreto: "ciclo 3 de 7". Sem cobrança, só orientação. */
    #contador {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: #7d92a3;
      min-height: 1rem;
    }

    /* Botão para encerrar a pausa quando quiser. */
    #pronto {
      margin-top: 2.2rem;
      padding: 0.6rem 2.2rem;
      font-size: 0.95rem;
      color: #cfe3dd;
      background: transparent;
      border: 1px solid rgba(207, 227, 221, 0.4);
      border-radius: 2rem;
      cursor: pointer;
    }

    #pronto:hover {
      background: rgba(207, 227, 221, 0.1);
    }
  </style>
</head>

<body>
  <!-- ===== HTML: a estrutura (o que existe na tela) ===== -->

  <!-- Tela inicial -->
  <div class="card">
    <h1>survive</h1>
    <p class="subtitle">pausas de respiração para soltar o maxilar</p>

    <div class="interval-row">
      <label for="interval">Intervalo entre pausas (minutos)</label>
      <input type="number" id="interval" value="90" min="1" max="480">
    </div>

    <button id="toggle">Iniciar</button>

    <p id="status"></p>
  </div>

  <!-- Overlay da pausa de respiração (invisível até a hora da pausa) -->
  <div id="overlay">
    <p id="frase">Solte o maxilar, os ombros e o pescoço.</p>
    <div id="circulo"></div>
    <p id="fase"></p>
    <p id="contador"></p>
    <button id="pronto">Pronto</button>
  </div>

  <!-- ===== JavaScript: o comportamento (o que acontece quando você interage) ===== -->
  <script>
    // ---------- Referências aos elementos da tela, pelos seus "id" ----------
    const intervalInput = document.getElementById("interval");
    const toggleButton  = document.getElementById("toggle");
    const statusText    = document.getElementById("status");
    const overlay       = document.getElementById("overlay");
    const circulo       = document.getElementById("circulo");
    const faseText      = document.getElementById("fase");
    const contadorText  = document.getElementById("contador");
    const prontoButton  = document.getElementById("pronto");

    // ---------- As constantes do ritmo respiratório (a spec do projeto) ----------
    const INSPIRA_MS  = 4000; // 4 segundos inspirando (círculo expande)
    const EXPIRA_MS   = 6000; // 6 segundos soltando o ar (círculo contrai)
    const TOTAL_CICLOS = 7;   // ~7 ciclos ≈ 70 segundos e encerra

    const TITULO_NORMAL = "survive — pausas de respiração";
    const TITULO_PAUSA  = "🌿 hora da pausa — survive";
    const CHAVE_INTERVALO = "survive.intervalo"; // nome da "gaveta" no localStorage

    // ---------- Estado do ciclo de lembretes ----------
    let running = false;      // o ciclo está ligado?
    let nextPauseAt = null;   // o momento da próxima pausa (em milissegundos)
    let clock = null;         // o "relógio" que bate a cada segundo
    let breathTimer = null;   // agenda a troca de fase da respiração
    let cicloAtual = 0;       // em qual dos 7 ciclos estamos

    // ---------- Som suave (Web Audio API) ----------
    // O navegador só deixa uma página tocar som depois de um clique do usuário.
    // Por isso criamos o "contexto de áudio" no clique de Iniciar: isso destrava
    // o som para todos os avisos seguintes.
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume(); // alguns navegadores criam o contexto "dormindo"
      }
    }

    // Toca duas notas suaves (Lá e Ré), como um sininho distante.
    // Em vez de um arquivo .mp3, o navegador SINTETIZA o som na hora —
    // assim o app continua sendo um único arquivo.
    function playChime() {
      if (!audioCtx) return; // sem contexto (nunca clicou Iniciar), sem som

      const agora = audioCtx.currentTime;
      const notas = [440, 587.33]; // frequências em Hz: Lá4 e Ré5

      notas.forEach((freq, i) => {
        const inicio = agora + i * 0.35; // segunda nota entra 0,35s depois

        const osc  = audioCtx.createOscillator(); // gera a onda sonora
        const gain = audioCtx.createGain();       // controla o volume
        osc.type = "sine"; // onda senoidal = timbre puro e suave
        osc.frequency.value = freq;

        // Envelope de volume: sobe rapidinho, decai devagar (sem "estalo").
        gain.gain.setValueAtTime(0, inicio);
        gain.gain.linearRampToValueAtTime(0.18, inicio + 0.06);
        gain.gain.exponentialRampToValueAtTime(0.0001, inicio + 1.6);

        osc.connect(gain).connect(audioCtx.destination);
        osc.start(inicio);
        osc.stop(inicio + 1.8);
      });
    }

    // ---------- Persistência do intervalo (localStorage) ----------
    // localStorage é um armazenamento simples do navegador que sobrevive ao
    // fechar a página. Usamos try/catch porque, em raras configurações
    // (ex.: cookies bloqueados), acessá-lo dá erro — e o app deve seguir vivo.
    function carregarIntervalo() {
      try {
        const salvo = localStorage.getItem(CHAVE_INTERVALO);
        if (salvo) intervalInput.value = salvo;
      } catch (e) { /* sem localStorage? tudo bem, fica o padrão 90 */ }
    }

    function salvarIntervalo(minutos) {
      try {
        localStorage.setItem(CHAVE_INTERVALO, minutos);
      } catch (e) { /* sem localStorage? tudo bem, só não persiste */ }
    }

    // ---------- O timer do ciclo ----------
    // Transforma milissegundos em texto tipo "12:05" (minutos:segundos).
    function formatTime(ms) {
      const totalSeconds = Math.max(0, Math.round(ms / 1000));
      const min = Math.floor(totalSeconds / 60);
      const sec = totalSeconds % 60;
      return min + ":" + String(sec).padStart(2, "0"); // padStart força 2 dígitos
    }

    // Lê o intervalo do campo, corrigindo valores inválidos.
    function lerIntervalo() {
      let minutes = Number(intervalInput.value);
      if (!minutes || minutes < 1) { // vazio ou inválido? volta ao padrão
        minutes = 90;
        intervalInput.value = 90;
      }
      return minutes;
    }

    // Marca a próxima pausa para daqui a X minutos.
    function scheduleNextPause() {
      nextPauseAt = Date.now() + lerIntervalo() * 60 * 1000;
    }

    // Liga o relógio de 1 segundo que atualiza a contagem regressiva.
    function startClock() {
      clock = setInterval(tick, 1000);
      tick(); // primeira atualização já, sem esperar 1 segundo
    }

    // Executa a cada segundo enquanto o ciclo está ativo.
    function tick() {
      const remaining = nextPauseAt - Date.now();

      if (remaining <= 0) {
        firePause(); // chegou a hora!
      } else {
        statusText.textContent = "Próxima pausa em " + formatTime(remaining);
      }
    }

    // ---------- A pausa de respiração ----------
    // Dispara a pausa: som + overlay. O relógio para enquanto você respira.
    function firePause() {
      clearInterval(clock);
      statusText.textContent = "";
      document.title = TITULO_PAUSA; // muda o título da aba para te chamar
      playChime();
      abrirOverlay();
    }

    function abrirOverlay() {
      cicloAtual = 0;
      overlay.classList.add("aberto");
      // Garante que o círculo começa pequeno e sem animação pendente.
      circulo.style.transition = "none";
      circulo.style.transform = "scale(1)";
      // Espera 1,2s parado (tempo de ler a frase) e começa a respiração.
      breathTimer = setTimeout(inspirar, 1200);
    }

    // Fase 1: inspirar pelo nariz — o círculo EXPANDE por 4 segundos.
    function inspirar() {
      cicloAtual++;
      if (cicloAtual > TOTAL_CICLOS) {
        encerrarPausa();
        return;
      }

      faseText.textContent = "Inspire pelo nariz";
      contadorText.textContent = "ciclo " + cicloAtual + " de " + TOTAL_CICLOS;

      // O transition diz: "quando o transform mudar, leve 4s, suavemente".
      circulo.style.transition = "transform " + (INSPIRA_MS / 1000) + "s ease-in-out";
      circulo.style.transform = "scale(1.65)"; // cresce 65%

      breathTimer = setTimeout(expirar, INSPIRA_MS); // daqui a 4s, próxima fase
    }

    // Fase 2: soltar pela boca com biquinho — o círculo CONTRAI por 6 segundos.
    function expirar() {
      faseText.textContent = "Solte pela boca (biquinho)";

      circulo.style.transition = "transform " + (EXPIRA_MS / 1000) + "s ease-in-out";
      circulo.style.transform = "scale(1)"; // volta ao tamanho original

      breathTimer = setTimeout(inspirar, EXPIRA_MS); // daqui a 6s, recomeça
    }

    // Fim natural da pausa: mensagem de despedida curta e fecha sozinho.
    function encerrarPausa() {
      faseText.textContent = "Pronto. Volte no seu ritmo.";
      contadorText.textContent = "";
      breathTimer = setTimeout(fecharOverlay, 2500);
    }

    // Fecha o overlay (pelo botão Pronto ou pelo fim dos ciclos)
    // e o ciclo de lembretes recomeça sozinho.
    function fecharOverlay() {
      clearTimeout(breathTimer); // cancela qualquer fase agendada
      overlay.classList.remove("aberto");
      faseText.textContent = "";
      contadorText.textContent = "";
      document.title = TITULO_NORMAL;

      if (running) {       // se ninguém apertou Pausar nesse meio-tempo...
        scheduleNextPause(); // ...a contagem recomeça do zero
        startClock();
      }
    }

    prontoButton.addEventListener("click", fecharOverlay);

    // ---------- O botão Iniciar/Pausar ----------
    toggleButton.addEventListener("click", () => {
      running = !running; // inverte: parado vira rodando, rodando vira parado

      if (running) {
        initAudio(); // o clique destrava o som para os avisos futuros
        salvarIntervalo(lerIntervalo());
        toggleButton.textContent = "Pausar";
        intervalInput.disabled = true; // trava o campo enquanto roda
        scheduleNextPause();
        startClock();
      } else {
        toggleButton.textContent = "Iniciar";
        intervalInput.disabled = false;
        clearInterval(clock); // desliga o relógio
        fecharOverlay();      // se a pausa estava aberta, fecha também
        statusText.textContent = "Ciclo pausado";
      }
    });

    // ---------- Ao abrir a página ----------
    carregarIntervalo(); // recupera o intervalo salvo da última vez
  </script>
</body>
</html>
