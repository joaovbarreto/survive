# Publica o site no GitHub Pages a cada push.
# O deploy é feito via GitHub Actions, então funciona a partir de qualquer branch listada abaixo.
name: Publicar no GitHub Pages

on:
  push:
    branches:
      - main
      - claude/survive-breathing-app-37nmww
  workflow_dispatch: # permite disparar manualmente pela aba Actions

# Permissões mínimas que o deploy do Pages exige.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que dois deploys não rodem ao mesmo tempo.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar o Pages (ativa na primeira vez)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Empacotar o site (a raiz do repositório)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
